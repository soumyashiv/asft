apiVersion: apps/v1
kind: Deployment
metadata:
  name: asft-api
  labels:
    app: asft
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asft
      component: api
  template:
    metadata:
      labels:
        app: asft
        component: api
    spec:
      containers:
      - name: asft-api
        image: asft:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: asft-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asft-worker
  labels:
    app: asft
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asft
      component: worker
  template:
    metadata:
      labels:
        app: asft
        component: worker
    spec:
      containers:
      - name: asft-worker
        image: asft:latest
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "asft.workers.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - secretRef:
            name: asft-secrets
        resources:
          requests:
            cpu: 1000m
            memory: 4Gi
            nvidia.com/gpu: 1
          limits:
            cpu: 4000m
            memory: 16Gi
            nvidia.com/gpu: 1
