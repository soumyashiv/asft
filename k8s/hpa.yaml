apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asft-api-hpa
  namespace: asft-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asft-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
