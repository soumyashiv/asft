# Default ASFT Configuration
# Auto-generated by `asft init`
# Override any section to customize behavior.

# ── Data directories ──────────────────────────────────────────────────────────
data_dir: "./asft_data"

# ── Hardware (auto-detected, manual override allowed) ─────────────────────────
hardware:
  precision: "bf16"          # fp32 | fp16 | bf16
  quantization: "none"       # none | 4bit | 8bit
  max_vram_gb: 0             # 0 = auto-detect
  batch_size: 1
  gradient_checkpointing: true

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: "Qwen/Qwen2-0.5B"
  cache_dir: "./asft_data/models"
  trust_remote_code: true
  revision: "main"

# ── LoRA / QLoRA ──────────────────────────────────────────────────────────────
lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  target_modules: null       # null = auto-detect from model architecture

# ── Sparse Fine-Tuning ────────────────────────────────────────────────────────
sparse:
  sparsity_ratio: 0.95       # Train only 5% of parameters
  max_steps: 1000
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  eval_steps: 50
  save_steps: 100
  delta_output_dir: "./asft_data/deltas"

# ── Memory ────────────────────────────────────────────────────────────────────
memory:
  episodic_db: "./asft_data/memory/episodic.db"
  semantic_db: "./asft_data/memory/semantic.db"
  long_term_db: "./asft_data/memory/long_term.db"
  working_memory_max_items: 1000
  working_memory_default_ttl_seconds: 3600
  consolidation_interval_hours: 24
  max_memory_query_results: 10

# ── Vector Database ───────────────────────────────────────────────────────────
vector:
  backend: "chromadb"        # chromadb | faiss | qdrant
  embedding_model: "all-MiniLM-L6-v2"
  chromadb_path: "./asft_data/chroma"
  faiss_index_path: "./asft_data/faiss/index.bin"
  qdrant_url: "http://localhost:6333"
  qdrant_collection: "asft_memory"
  top_k_default: 5

# ── Dataset Compression ───────────────────────────────────────────────────────
dataset:
  dedup_threshold: 0.85
  dedup_num_perm: 128
  cluster_method: "kmeans"   # kmeans | dbscan
  cluster_reduction_ratio: 0.3
  compressed_output_dir: "./asft_data/datasets"

# ── Accuracy Enhancement ──────────────────────────────────────────────────────
accuracy:
  min_confidence_threshold: 0.70
  multi_pass_k: 3
  multi_pass_strategy: "escalating"   # best_of_k | self_consistency | escalating
  enable_self_critique: true
  enable_code_verification: true
  max_critique_rounds: 2

# ── Self-Improvement ──────────────────────────────────────────────────────────
improvement:
  analysis_window_hours: 72
  min_tasks_for_analysis: 10
  improvement_cycle_interval_hours: 6
  enable_prompt_optimization: true
  enable_workflow_optimization: true

# ── Benchmark ─────────────────────────────────────────────────────────────────
benchmark:
  output_dir: "./asft_data/benchmarks"
  eval_samples: 50
  inference_warmup_runs: 3
  inference_timing_runs: 10

# ── API ───────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8080
  reload: false
  log_level: "info"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  log_dir: "./asft_data/logs"
  log_file: "asft.log"
  max_bytes: 10485760       # 10 MB
  backup_count: 5
